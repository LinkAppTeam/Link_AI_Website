<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link - AI Dating App</title>
    <style>
        :root {
            --appTheme: #BEAA73;
            --dockColor: #E1CD96;
            --appAccent: #37415A;
        }

        body {
            background-color: var(--appTheme);
            color: var(--appAccent);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            text-align: center;
        }

        /* Top Left Header Logo */
        header {
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            text-align: left;
        }
        
        .header-logo {
            height: 40px;
            width: auto;
        }

        /* Main Center Content */
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .main-icon {
            width: 150px;
            height: 150px;
            border-radius: 32px; /* iOS style rounding */
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            object-fit: cover;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 0 0 10px 0;
            color: var(--appAccent);
        }

        p {
            font-size: 1.2rem;
            color: var(--appAccent);
            opacity: 0.8;
            max-width: 400px;
            line-height: 1.5;
            margin-bottom: 40px;
        }

        .download-btn {
            background-color: var(--appAccent);
            color: #FFFFFF;
            padding: 16px 32px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(55, 65, 90, 0.3);
        }

        .download-btn:hover {
            transform: scale(1.05);
        }

        /* Footer */
        footer {
            background-color: var(--dockColor);
            padding: 30px 20px;
            font-size: 0.9rem;
            color: var(--appAccent);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }

        footer a {
            color: var(--appAccent);
            text-decoration: none;
            font-weight: bold;
            margin: 0 15px;
        }

        footer a:hover {
            text-decoration: underline;
        }
        
        .copyright {
            margin-top: 15px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html">
            <img src="LinkLogo_all_white.png" alt="Link" class="header-logo">
        </a>
    </header>

    <div class="container">
        <img src="AppIcon_1024.png" alt="Link App Icon" class="main-icon">
        
        <h1>Link</h1>
        <p>AI-driven matchmaking. Find your link without the endless swiping.</p>
        
        <a href="#" class="download-btn">Coming Soon to the App Store</a>
    </div>

    <footer>
        <a href="support.html">Support</a>
        <a href="privacy.html">Privacy Policy</a>
        <a href="terms.html">Terms of Service</a>
        
        <div class="copyright">
            &copy; 2026 2717292 ONTARIO INC. All rights reserved.
        </div>
    </footer>

</body>
</html>
