<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link - AI Dating App</title>
    <style>
        /* Base Theme matching your SwiftUI appTheme */
        body {
            background-color: #141419;
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            text-align: center;
        }

        /* Container to center everything */
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Logo Styling */
        .logo {
            width: 120px;
            height: 120px;
            border-radius: 24px;
            margin-bottom: 20px;
            /* Placeholder styling if image doesn't load */
            background-color: #2A2A35; 
            object-fit: cover;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin: 0 0 10px 0;
        }

        p {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            max-width: 400px;
            line-height: 1.5;
            margin-bottom: 40px;
        }

        /* App Store Button Placeholder */
        .download-btn {
            background-color: #FFFFFF;
            color: #000000;
            padding: 14px 28px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: opacity 0.2s;
        }

        .download-btn:hover {
            opacity: 0.8;
        }

        /* Footer for Apple's Legal Requirements */
        footer {
            padding: 30px 20px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
        }

        footer a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            margin: 0 10px;
        }

        footer a:hover {
            text-decoration: underline;
        }
        
        .copyright {
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="LinkLogo_all_white.png" alt="Link App Logo" class="logo">
        
        <h1>Link</h1>
        <p>AI-driven matchmaking. Find your link without the endless swiping.</p>
        
        <a href="#" class="download-btn">Coming Soon to the App Store</a>
    </div>

    <footer>
        <a href="mailto:support.link.ai@gmail.com">Support</a>
        <a href="#">Privacy Policy</a>
        <a href="#">Terms of Service</a>
        
        <div class="copyright">
            &copy; 2026 Ontario 272192929 INC. All rights reserved.
        </div>
    </footer>

</body>
</html>
